name: Update Ticker List

on:
  schedule:
    # Every Sunday 01:00 UTC (9:00 AM MYT) - refreshes the full stock list
    - cron: "0 1 * * 0"
  workflow_dispatch:   # manual run button for the first generation

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Regenerate tickers.csv
        run: python update_tickers.py

      - name: Commit updated list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tickers.csv
          git diff --cached --quiet || (git commit -m "Auto-update ticker list" && git push)
